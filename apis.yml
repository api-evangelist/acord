- aid: acord:acord-xml-standards-api
  name: ACORD XML Standards API
  tags:
  - ACORD
  - Claims
  - Insurance
  - Policy
  - Property Casualty
  - SOAP
  - XML
  image: https://raw.githubusercontent.com/api-evangelist/acord/refs/heads/main/image.png
