    type: Reference
  description: >-
    ACORD XML Standards define data exchange formats for property & casualty, life,
    annuity, and reinsurance using SOAP/XML protocols. APIs enable claims inquiry,
    policy administration, and regulatory reporting across insurers, reinsurers,
    and intermediaries.

